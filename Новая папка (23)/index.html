<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Камень Ножницы Бумага</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">
    <h1>Камень Ножницы Бумага</h1>

    <div class="choices">
        <button onclick="play('rock')">🪨 Камень</button>
        <button onclick="play('scissors')">✂️ Ножницы</button>
        <button onclick="play('paper')">📄 Бумага</button>
    </div>

    <div class="result">
        <p id="playerChoice">You chose: -</p>
        <p id="computerChoice">Opponent chose: -</p>
        <h2 id="winner">Результат</h2>
    </div>

    <div class="score">
        <p>Игрок: <span id="playerScore">0</span></p>
        <p>Компьютер: <span id="computerScore">0</span></p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
